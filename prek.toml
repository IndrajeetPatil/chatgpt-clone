minimum_prek_version = "0.3.11"
default_install_hook_types = ["pre-commit", "pre-push", "commit-msg"]
default_stages = ["pre-commit"]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.12"
hooks = [
  { id = "ruff", args = ["--fix"] },
  { id = "ruff-format" },
]

[[repos]]
repo = "https://github.com/rvben/rumdl-pre-commit"
rev = "v0.1.86"
hooks = [
  { id = "rumdl" },
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "commitlint",
    name = "commitlint",
    language = "node",
    entry = "commitlint --config commitlint.config.mjs --edit",
    additional_dependencies = [
      "@commitlint/cli@20.5.3",
      "@commitlint/config-conventional@20.5.3",
    ],
    stages = ["commit-msg"],
  },
  {
    id = "checkov",
    name = "checkov security scan",
    language = "system",
    entry = "make security-scan",
    pass_filenames = false,
    stages = ["pre-push"],
  },
]

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace", exclude = "\\.snap$" },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "check-json", exclude = "^\\.vscode/" },
  { id = "check-merge-conflict" },
  { id = "mixed-line-ending", args = ["--fix=lf"] },
  { id = "check-added-large-files" },
  { id = "detect-private-key" },
  { id = "fix-byte-order-marker" },
  { id = "no-commit-to-branch", args = ["--branch=main"] },
]
