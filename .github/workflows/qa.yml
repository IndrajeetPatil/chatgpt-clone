name: QA Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  statuses: write

jobs:
  qa:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d  # v6.0.5
        with:
          version: 11.0.4

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: "frontend/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: "frontend/pnpm-lock.yaml"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make

      - name: Install ls-lint v2.3.1
        run: |
          curl -fsSLO "https://github.com/loeffel-io/ls-lint/releases/download/v2.3.1/ls-lint-linux-amd64"
          echo "b5a0d2e4427ad039fbc574551f17679f38f142b25d15e0e538769f8cf15af397  ls-lint-linux-amd64" | sha256sum -c
          chmod +x ls-lint-linux-amd64
          sudo mv ls-lint-linux-amd64 /usr/local/bin/ls-lint

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          uv python install
          uv sync --frozen

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps

      - name: Run QA checks
        run: make qa

      - name: Build frontend
        working-directory: ./frontend
        run: pnpm run build

      - name: Lighthouse CI (collect)
        working-directory: ./frontend
        run: pnpm dlx @lhci/cli@0.15.1 collect

      - name: Lighthouse CI (scores)
        working-directory: ./frontend
        run: |
          node -e "
            const fs = require('fs');
            const dir = '.lighthouseci';
            const files = fs.readdirSync(dir).filter(f => f.startsWith('lhr-') && f.endsWith('.json'));
            const byUrl = {};
            for (const f of files) {
              const r = JSON.parse(fs.readFileSync(dir + '/' + f, 'utf8'));
              (byUrl[r.finalUrl] = byUrl[r.finalUrl] || []).push(r);
            }
            const cats = ['performance','accessibility','best-practices','seo'];
            const U = 32, C = 16;
            const lpad = (s, n) => String(s).padStart(n);
            const rpad = (s, n) => String(s).length >= n ? String(s).slice(0, n-1) + '…' : String(s).padEnd(n);
            console.log('\n' + rpad('URL', U) + cats.map(c => lpad(c, C)).join(''));
            console.log('-'.repeat(U + C * cats.length));
            for (const [url, runs] of Object.entries(byUrl)) {
              const avg = cats.map(c => {
                const scores = runs.map(r => r.categories[c]?.score ?? null).filter(s => s !== null);
                return scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length*100) : '-';
              });
              const label = url.replace('http://localhost','').replace(/\/$/,'') || '/';
              console.log(rpad(label, U) + avg.map(s => lpad(s, C)).join(''));
            }
            console.log('');
          "

      - name: Lighthouse CI (assert)
        working-directory: ./frontend
        run: pnpm dlx @lhci/cli@0.15.1 assert

      - name: Lighthouse CI (upload)
        working-directory: ./frontend
        run: pnpm dlx @lhci/cli@0.15.1 upload --githubToken="$GITHUB_TOKEN"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-reports
          path: |
            backend/htmlcov
            frontend/coverage
            frontend/playwright-report
